name: Bug report
description: Report a reproducible problem in the lab shell, settings, source loading, or renderer
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a problem. Issues are for reproducible bugs.
        Questions, tuning ideas, and integration help belong in Discussions.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - App shell / UI
        - Source loading
        - Settings / presets
        - Renderer lifecycle
        - Shader / optical model
        - Export / recording
        - Documentation
        - CI / tooling
        - Not sure
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact steps.
      placeholder: |
        1. Run npm run dev
        2. Load source...
        3. Set ior...
        4. Observe...
    validations:
      required: true

  - type: textarea
    id: source
    attributes:
      label: Source setup
      description: What source did you use?
      placeholder: |
        Source type: built-in demo / uploaded image / uploaded motion source
        Source frame mode: viewport / natural / manual
        Source size:
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true

  - type: textarea
    id: preset
    attributes:
      label: Preset / settings JSON
      description: Paste the preset if the issue depends on optical settings.
      render: json

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS:
        Browser:
        Browser version:
        GPU:
        Node:
        npm:
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and discussions
          required: true
        - label: I can reproduce this with the latest `main` branch or live site
          required: true
        - label: I ran npm run test
          required: false
        - label: I ran npm run build
          required: false
        - label: I can reproduce this with ior = 0 / clean source path
          required: false
